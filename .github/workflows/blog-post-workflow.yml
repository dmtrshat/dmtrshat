name: Update readme with blog posts
on: 
  push:
    branches: 
      - master
  schedule:
    - cron: 0 8 * * *

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: JasonEtco/rss-to-readme@v1
        with:
          feed-url: https://dev.to/feed/dmtrshat
          readme-section: feed
          max: 5
          template: "#### [{{ title }}]({{ link }}) \n*{{ contentSnippet }}*\n\n"
